<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .search-bar {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 20px auto;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-bar button {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: #667eea;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-bar button:hover {
            transform: scale(1.05);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .weather-card:hover {
            transform: translateY(-5px);
        }

        .current-weather {
            grid-column: 1 / -1;
            text-align: center;
        }

        .current-weather .city {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .current-weather .temperature {
            font-size: 4em;
            color: #667eea;
            font-weight: bold;
        }

        .current-weather .description {
            font-size: 1.3em;
            color: #666;
            margin-top: 10px;
            text-transform: capitalize;
        }

        .weather-icon {
            font-size: 4em;
            margin: 20px 0;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .forecast-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .forecast-card .day {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .forecast-card .icon {
            font-size: 2em;
            margin: 10px 0;
        }

        .forecast-card .temp {
            font-size: 1.3em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            grid-column: 1 / -1;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.5em;
        }

        .weather-card.loading {
            background: rgba(255,255,255,0.9);
            text-align: center;
            padding: 50px;
            grid-column: 1 / -1;
        }

        .suggestions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .suggestion-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .suggestion-btn:hover {
            background: white;
            color: #667eea;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .current-weather .temperature {
                font-size: 2.5em;
            }

            .weather-details {
                grid-template-columns: 1fr;
            }

            .search-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather updates for any location</p>
        </div>

        <div class="search-bar">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                onkeypress="if(event.key === 'Enter') searchWeather()"
            >
            <button onclick="searchWeather()">Search</button>
        </div>

        <div class="suggestions">
            <button class="suggestion-btn" onclick="searchByCity('London')">London</button>
            <button class="suggestion-btn" onclick="searchByCity('New York')">New York</button>
            <button class="suggestion-btn" onclick="searchByCity('Tokyo')">Tokyo</button>
            <button class="suggestion-btn" onclick="searchByCity('Paris')">Paris</button>
            <button class="suggestion-btn" onclick="getLocation()">📍 My Location</button>
        </div>

        <div class="weather-grid" id="weatherContainer">
            <div class="loading">Loading weather data...</div>
        </div>

        <div class="footer">
            <p>Weather data provided by Open-Meteo API • No API key required • Always free</p>
        </div>
    </div>

    <script>
        // Initialize with default city
        document.addEventListener('DOMContentLoaded', () => {
            searchByCity('New York');
        });

        // Get user's geolocation
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        fetchWeatherByCoordinates(lat, lon);
                    },
                    () => {
                        alert('Unable to get your location. Please enable location services.');
                    }
                );
            } else {
                alert('Geolocation is not supported by your browser.');
            }
        }

        // Search weather by city name
        function searchByCity(city) {
            document.getElementById('cityInput').value = city;
            searchWeather();
        }

        // Main search function
        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                alert('Please enter a city name');
                return;
            }

            showLoading();

            try {
                // Get coordinates from city name
                const geoResponse = await fetch(
                    `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`
                );
                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    showError('City not found. Please try another city.');
                    return;
                }

                const result = geoData.results[0];
                const lat = result.latitude;
                const lon = result.longitude;
                const cityName = result.name;
                const country = result.country;

                // Fetch weather data
                fetchWeatherData(lat, lon, cityName, country);
            } catch (error) {
                showError('Error fetching weather data. Please try again.');
                console.error(error);
            }
        }

        // Fetch weather by coordinates
        async function fetchWeatherByCoordinates(lat, lon) {
            showLoading();

            try {
                // Get city name from coordinates
                const geoResponse = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
                );
                const geoData = await geoResponse.json();
                const cityName = geoData.address.city || geoData.address.town || 'Your Location';

                fetchWeatherData(lat, lon, cityName, geoData.address.country);
            } catch (error) {
                fetchWeatherData(lat, lon, 'Your Location', '');
            }
        }

        // Fetch actual weather data
        async function fetchWeatherData(lat, lon, cityName, country) {
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=celsius&timezone=auto`
                );
                const data = await response.json();

                displayWeather(data, cityName, country);
            } catch (error) {
                showError('Error fetching weather data. Please try again.');
                console.error(error);
            }
        }

        // Display weather data
        function displayWeather(data, cityName, country) {
            const current = data.current;
            const daily = data.daily;
            const weatherCode = current.weather_code;
            const weatherIcon = getWeatherIcon(weatherCode);
            const weatherDescription = getWeatherDescription(weatherCode);

            let html = `
                <div class="weather-card current-weather">
                    <div class="city">${cityName}, ${country}</div>
                    <div class="weather-icon">${weatherIcon}</div>
                    <div class="temperature">${Math.round(current.temperature_2m)}°C</div>
                    <div class="description">${weatherDescription}</div>
                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${current.relative_humidity_2m}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Wind Speed</div>
                            <div class="detail-value">${Math.round(current.wind_speed_10m)} km/h</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Precipitation</div>
                            <div class="detail-value">${current.precipitation} mm</div>
                        </div>
                    </div>
                    
                    <h3 style="margin-top: 40px; color: #333;">7-Day Forecast</h3>
                    <div class="forecast-grid">
            `;

            // Add 7-day forecast
            for (let i = 0; i < 7; i++) {
                const date = new Date(daily.time[i]);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const dayNum = date.getDate();
                const code = daily.weather_code[i];
                const icon = getWeatherIcon(code);
                const maxTemp = Math.round(daily.temperature_2m_max[i]);
                const minTemp = Math.round(daily.temperature_2m_min[i]);

                html += `
                    <div class="forecast-card">
                        <div class="day">${dayName} ${dayNum}</div>
                        <div class="icon">${icon}</div>
                        <div class="temp">${maxTemp}°C / ${minTemp}°C</div>
                    </div>
                `;
            }

            html += `
                    </div>
                </div>
            `;

            document.getElementById('weatherContainer').innerHTML = html;
        }

        // Get weather icon based on WMO code
        function getWeatherIcon(code) {
            const iconMap = {
                0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
                45: '🌫️', 48: '🌫️',
                51: '🌧️', 53: '🌧️', 55: '🌧️',
                61: '🌧️', 63: '🌧️', 65: '⛈️',
                71: '🌨️', 73: '🌨️', 75: '🌨️', 77: '🌨️',
                80: '🌦️', 81: '⛈️', 82: '⛈️',
                85: '🌨️', 86: '🌨️',
                95: '⛈️', 96: '⛈️', 99: '⛈️'
            };
            return iconMap[code] || '🌤️';
        }

        // Get weather description
        function getWeatherDescription(code) {
            const descMap = {
                0: 'Clear sky',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Foggy',
                48: 'Foggy',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                71: 'Slight snow',
                73: 'Moderate snow',
                75: 'Heavy snow',
                77: 'Snow grains',
                80: 'Slight rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                85: 'Slight snow showers',
                86: 'Heavy snow showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with hail',
                99: 'Thunderstorm with hail'
            };
            return descMap[code] || 'Unknown';
        }

        // Show loading state
        function showLoading() {
            document.getElementById('weatherContainer').innerHTML = 
                '<div class="weather-card loading">Loading weather data...</div>';
        }

        // Show error
        function showError(message) {
            document.getElementById('weatherContainer').innerHTML = 
                `<div class="error">${message}</div>`;
        }
    </script>
</body>
</html>
